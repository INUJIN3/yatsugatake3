<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#e8e0cc;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;">
<form action="" method="get" style="background:#f5f0e6;padding:32px;max-width:340px;width:100%;border-top:3px solid #385830;">
  <div style="font-size:20px;font-weight:bold;margin-bottom:16px;">旅人として登録する</div>
  <input name="name" type="text" placeholder="あなたの名前" style="width:100%;font-size:20px;padding:8px 0;border:none;border-bottom:2px solid #385830;background:transparent;outline:none;margin-bottom:20px;">
  <button type="submit" style="width:100%;padding:16px;background:#385830;color:#fff;border:none;font-size:14px;">旅を始める →</button>
</form>
</body>
</html>
