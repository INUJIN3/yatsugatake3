<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#e8e0cc;font-family:sans-serif;">
<div style="background:#385830;padding:14px 20px;">
  <div style="font-size:10px;color:rgba(255,255,255,0.5);">たのしゅぎょ！</div>
  <div style="font-size:17px;font-weight:bold;color:#fff;">八ヶ岳の旅</div>
</div>
<div id="pg" style="padding:20px;font-size:16px;color:#1c1810;">読み込み中...</div>
<script>
var D = {1:{date:"4月19日",q:"この旅の中で、何を見つけたい？"}};
var day = 1;
var d = D[day];
document.getElementById("pg").innerHTML =
  "<div style='font-size:20px;font-weight:bold;margin-bottom:12px;'>" + d.date + "</div>" +
  "<div style='font-size:18px;line-height:1.8;'>" + d.q + "</div>";
</script>
</body>
