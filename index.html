<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:#e8e0cc;font-family:sans-serif;margin:0;">
<div style="background:#385830;padding:14px 20px;">
  <div style="font-size:17px;font-weight:bold;color:#fff;">八ヶ岳の旅</div>
</div>
<div id="pg" style="padding:20px;"></div>
<script>
var D={
  1:{date:"4月19日",q:"この旅の中で、\n何を見つけたい？"},
  2:{date:"4月20日",q:"ちょっと気づいたことは？"},
  3:{date:"4月21日",q:"どんな変化をもたらしてくれそう？"}
};
function goDay(d){
  document.getElementById("pg").innerHTML=
    "<div style='font-size:20px;font-weight:bold;color:#1c1810;margin-bottom:12px;'>"+D[d].date+"</div>"+
    "<div style='font-size:18px;line-height:1.8;white-space:pre-line;color:#1c1810;'>"+D[d].q+"</div>";
}
goDay(1);
</script>
</body>
</html>
