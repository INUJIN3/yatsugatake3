
<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たのしゅぎょ！八ヶ岳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e8e0cc;font-family:sans-serif;min-height:100vh;}
#wrap{max-width:480px;margin:0 auto;background:#f5f0e6;min-height:100vh;}
.hd{background:#385830;padding:14px 20px;display:flex;justify-content:space-between;align-items:flex-end;position:sticky;top:0;z-index:9;}
.hd-l .sub{font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:2px;margin-bottom:2px;}
.hd-l .ttl{font-size:17px;font-weight:bold;color:#fff;}
.hd-r{text-align:right;font-size:11px;color:rgba(255,255,255,0.65);}
.tabs{display:flex;background:#ede5d0;border-bottom:1px solid rgba(0,0,0,0.1);}
.tab{flex:1;padding:10px 4px 8px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:sans-serif;}
.tab.on{background:#f5f0e6;border-bottom-color:#385830;}
.tab .dn{font-size:14px;font-weight:bold;color:#aaa;}
.tab .dl{font-size:9px;color:#aaa;letter-spacing:1px;}
.tab.on .dn{color:#385830;}
.tab.on .dl{color:#7a9a6c;}
.sec{padding:18px 20px;border-bottom:1px solid rgba(0,0,0,0.08);}
.sec.warm{background:#ede5d0;}
.lbl{font-size:10px;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.sch-row{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.05);}
.sch-row:last-child{border:none;}
.sch-t{font-size:11px;color:#aaa;width:42px;flex-shrink:0;padding-top:1px;}
.sch-txt{font-size:12px;color:#46402e;line-height:1.5;}
.q-text{font-size:20px;font-weight:bold;color:#1c1810;line-height:1.8;margin-bottom:16px;white-space:pre-line;}
textarea{width:100%;border:none;border-bottom:1px solid rgba(0,0,0,0.12);background:transparent;font-family:sans-serif;font-size:14px;color:#1c1810;line-height:1.8;resize:none;padding:4px 0 8px;outline:none;margin-bottom:14px;}
textarea::placeholder{color:#ccc;}
.feel-row{display:flex;gap:6px;margin-bottom:14px;}
.feel-btn{flex:1;padding:10px 4px;background:transparent;border:1px solid rgba(0,0,0,0.12);cursor:pointer;font-size:12px;font-family:sans-serif;color:#aaa;display:flex;flex-direction:column;align-items:center;gap:3px;}
.feel-btn .fi{font-size:20px;}
.feel-btn.ok{border-color:#385830;background:rgba(56,88,48,0.06);color:#385830;}
.feel-btn.ok2{border-color:#786030;background:rgba(120,96,48,0.05);color:#786030;}
.feel-btn.ok3{border-color:#686258;background:rgba(104,98,88,0.05);color:#686258;}
.rec-btn{width:100%;padding:14px;background:#385830;border:none;color:#fff;font-family:sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer;}
.rec-btn:disabled{background:#ccc;cursor:default;}
.ms-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.ms-lbl{font-size:10px;color:#aaa;letter-spacing:2px;text-transform:uppercase;}
.ms-line{flex:1;height:1px;background:rgba(0,0,0,0.1);}
.upd-btn{border:1px solid rgba(0,0,0,0.12);background:transparent;padding:4px 12px;cursor:pointer;font-size:11px;color:#aaa;font-family:sans-serif;}
.wave-box{background:#ede5d0;border:1px solid rgba(0,0,0,0.1);padding:12px;margin-bottom:14px;}
.wave-inner{display:flex;gap:6px;}
.wave-yax{display:flex;flex-direction:column;justify-content:space-between;font-size:14px;padding:2px 0;}
.mcard{padding:12px 14px;background:#ede5d0;border:1px solid rgba(0,0,0,0.1);margin-bottom:7px;}
.mcard.me{background:rgba(56,88,48,0.05);border-color:#c2d2b6;border-left:2px solid #385830;}
.mc-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.mc-init{width:26px;height:26px;border-radius:50%;border:1px solid #aaa;display:flex;align-items:center;justify-content:center;font-size:13px;color:#46402e;flex-shrink:0;}
.mc-name{font-size:12px;color:#46402e;flex:1;}
.mc-face{font-size:18px;}
.mc-ans{font-size:13px;color:#78705a;line-height:1.7;padding-left:34px;font-style:italic;}
.mc-none{font-size:11px;color:#ccc;padding-left:34px;font-style:italic;}
.toast{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);z-index:99;}
.toast-box{background:#f5f0e6;border-top:2px solid #385830;padding:20px 28px;text-align:center;max-width:260px;}
.toast-ttl{font-size:10px;color:#385830;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;}
.toast-msg{font-size:14px;color:#1c1810;line-height:1.8;}
.sv{padding:20px;background:#ede5d0;border-top:1px solid rgba(0,0,0,0.08);}
.sv-q{font-size:17px;font-weight:bold;color:#1c1810;line-height:1.8;margin-bottom:8px;}
.sv-n{font-size:12px;color:#78705a;line-height:1.7;font-style:italic;}
.ft{padding:18px 20px 40px;display:flex;justify-content:space-between;align-items:center;}
.ft-q{font-size:11px;color:#aaa;line-height:1.7;font-style:italic;}
.ft-l{font-size:14px;font-weight:bold;color:#385830;}
.hidden{display:none;}
</style>
</head>
<body>

<!-- 名前入力 -->

<div id="name-screen">
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#e8e0cc;">
<div style="background:#f5f0e6;border-top:3px solid #385830;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.12);">
  <div style="font-size:20px;font-weight:bold;color:#1c1810;margin-bottom:6px;">旅人として登録する</div>
  <div style="font-size:13px;color:#78705a;line-height:1.7;margin-bottom:20px;">名前を入れてください。<br>仲間の画面に表示されます。</div>
  <input id="ni" type="text" placeholder="あなたの名前" maxlength="8"
    style="width:100%;border:none;border-bottom:1px solid rgba(0,0,0,0.15);background:transparent;font-size:20px;padding:6px 0 10px;outline:none;margin-bottom:20px;font-family:sans-serif;color:#1c1810;">
  <button onclick="setName()" style="width:100%;padding:14px;background:#385830;border:none;color:#fff;font-size:13px;letter-spacing:2px;cursor:pointer;font-family:sans-serif;">旅を始める →</button>
</div>
</div>
</div>

<!-- メイン -->

<div id="main-screen" class="hidden">
<div id="wrap">

  <div class="hd">
    <div class="hd-l">
      <div class="sub">たのしゅぎょ！</div>
      <div class="ttl">八ヶ岳の旅</div>
    </div>
    <div class="hd-r" id="hd-r">2026年4月19日<br>Day 1</div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab1" onclick="goDay(1)"><div class="dn">19</div><div class="dl">1日目</div></button>
    <button class="tab" id="tab2" onclick="goDay(2)"><div class="dn">20</div><div class="dl">2日目</div></button>
    <button class="tab" id="tab3" onclick="goDay(3)"><div class="dn">21</div><div class="dl">3日目</div></button>
  </div>

  <div id="page"></div>

</div>
</div>

<script>
const GAS="https://script.google.com/macros/s/AKfycbxn629yTdMKUb_JkSyuaB_86NwwpDKgBTfWWKCkv_sHQQjvsaozyW5hzQiq2_YwMmLJ/exec";
const PAL=["#385830","#786030","#3c5668","#8a503c","#506428","#644870","#3c6e5a","#784050"];
const FACE={great:"😊",soso:"🙂",hmm:"😐"};
const FY={great:8,soso:36,hmm:64};

const D={
  1:{date:"4月19日（日）",badge:"Day 1",
     q:"この旅の中で、\n何を見つけたい？",
     sch:[["12:06","JR茅野駅 集合"],["12:15","さくらさく ランチ（馬肉・須田先生と）"],["午後","茅野市周辺 視察"],["15:30","白樺湖池の平ホテル チェックイン"],["18:00","矢島社長と会食MTG"]]},
  2:{date:"4月20日（月）",badge:"Day 2",
     q:"この旅の中で、ちょっと気づいたことが\nあるとしたら、それは何？",
     sch:[["9:00","御諏訪太鼓 演奏体験（山本麻琴さんと）"],["10:00","温泉施設 訪問（栗山友理さんと）"],["11:00","e-bike で白樺湖一周（Hygge）"],["13:00","蓼科湖周辺 ランチ"],["14:00","8peaks brewery 見学"],["15:15","古過庵 — 縄文ブッシュクラフト体験"],["16:10","笹原集落 — ガイドのお話"],["20:00","8peaks family 交流会（PianoMan）"]]},
  3:{date:"4月21日（火）",badge:"Day 3",
     q:"この旅は、これからの日々に\nどんな変化をもたらしてくれそう？",
     sch:[["9:00","「森と、ピアノと、」訪問・ミニ演奏会"],["10:30","野口果樹園 訪問"],["13:00","ボードゲーム施設 GAW 見学"],["15:00","ヤマファーム 見学"],["16:00","茅野駅 解散"]]}
};

let name="",day=1,ans={1:"",2:"",3:""},feels={1:"",2:"",3:""},rows={1:[],2:[],3:[]},cm={},ci=0,sending=false,loading=false;

// 今日の日付で初期タブ
const td=new Date().getDate();
if(td===20)day=2; else if(td===21)day=3;

function gc(n){if(cm[n]===undefined)cm[n]=ci++%PAL.length;return PAL[cm[n]];}

function setName(){
  const v=document.getElementById("ni").value.trim();
  if(!v)return;
  name=v;
  localStorage.setItem("yt9_name",v);
  document.getElementById("name-screen").className="hidden";
  document.getElementById("main-screen").className="";
  // feel復元
  [1,2,3].forEach(d=>{const f=localStorage.getItem("yt9_feel_"+d);if(f)feels[d]=f;});
  goDay(day);
}

function goDay(d){
  day=d;
  [1,2,3].forEach(i=>{
    document.getElementById("tab"+i).className="tab"+(i===d?" on":"");
  });
  const dd=D[d];
  document.getElementById("hd-r").innerHTML="2026年"+dd.date+"<br>"+dd.badge;
  renderPage();
}

function renderPage(){
  const d=D[day],r=rows[day]||[];
  const sch=d.sch.map(([t,txt])=>`<div class="sch-row"><span class="sch-t">${t}</span><span class="sch-txt">${txt}</span></div>`).join("");
  const fb=[["great","😊","いい感じ"],["soso","🙂","まあまあ"],["hmm","😐","うーん"]].map(([t,f,w])=>{
    const cls=t==="great"?"ok":t==="soso"?"ok2":"ok3";
    return `<button class="feel-btn${feels[day]===t?" "+cls:""}" onclick="setFeel('${t}')"><span class="fi">${f}</span><span>${w}</span></button>`;
  }).join("");

  const wave=makeWave(r);
  const cards=makeCards(r);
  const sv=day===3?`<div class="sv"><div class="lbl">Souvenir</div><div class="sv-q">あなたが「本当にやりたかったこと」は、<br>今もまだ、あなたの中にあるか。</div><div class="sv-n">この問いに、すぐ答えなくていい。<br>日常に戻ってから、ふとした瞬間に思い出したとき、少しだけ立ち止まってみよう。</div></div>`:"";

  document.getElementById("page").innerHTML=`
    <div class="sec"><div class="lbl">Day ${day}</div><div style="font-size:19px;font-weight:bold;color:#1c1810;margin-bottom:2px;">${d.date.replace("（","<br><span style='font-size:13px;color:#aaa;font-weight:normal;'>").replace("）","</span>")}</div></div>
    <div class="sec warm"><div class="lbl">今日の行程</div>${sch}</div>
    <div class="sec">
      <div class="lbl">今日の問い</div>
      <div class="q-text">${d.q}</div>
      <textarea id="ta" rows="3" placeholder="思ったことを、そのまま…" oninput="ans[${day}]=this.value">${ans[day]}</textarea>

```
  <div class="lbl">手ごたえ</div>
  <div class="feel-row">${fb}</div>
  <button class="rec-btn" id="rbtn" onclick="doRecord()" ${sending?"disabled":""}>
    ${sending?"送信中…":"記録して仲間に届ける"}
  </button>
</div>
<div class="sec">
  <div class="ms-head">
    <span class="ms-lbl">仲間の記録</span>
    <div class="ms-line"></div>
    <button class="upd-btn" onclick="doLoad()">${loading?"…":"更新"}</button>
    ${r.length>0?`<span style="font-size:11px;color:#aaa;">${r.length}人</span>`:""}
  </div>
  ${wave}
  ${cards}
</div>
${sv}
<div class="ft"><div class="ft-q">失敗も後悔も、取り返しのつかないことも、<br>全部持ったまま、旅に出よう。</div><div class="ft-l">たのしゅぎょ！</div></div>
```

`;
}

function makeWave(r){
const felt=r.filter(x=>x.feel);
if(!felt.length)return`<div class="wave-box"><div class="lbl">手ごたえの波</div><div style="text-align:center;padding:12px;font-size:12px;color:#ccc;font-style:italic;">記録が届くとここに波が現れます</div></div>`;
const W=250,H=72,total=felt.length;
const names=[…new Set(felt.map(x=>x.name))];
let paths=””,legend=””;
[8,36,64].forEach(y=>{paths+=`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="rgba(0,0,0,0.07)" stroke-dasharray="3,4"/>`;});
names.forEach(n=>{
const p=felt.filter(x=>x.name===n);
const col=gc(n);
const pts=p.map(x=>{const i=felt.indexOf(x);return[total<=1?W/2:(i/(total-1))*(W-16)+8,FY[x.feel]??36];});
if(pts.length===1){paths+=`<circle cx="${pts[0][0]}" cy="${pts[0][1]}" r="5" fill="${col}"/>`;}
else{
const hx=col.replace(’#’,’’);
const rr=parseInt(hx.slice(0,2),16),gg=parseInt(hx.slice(2,4),16),bb=parseInt(hx.slice(4,6),16);
let fl=`M${pts[0][0]} ${H} L${pts[0][0]} ${pts[0][1]}`,ln=`M${pts[0][0]} ${pts[0][1]}`;
for(let i=1;i<pts.length;i++){const cx=(pts[i-1][0]+pts[i][0])/2,cy=(pts[i-1][1]+pts[i][1])/2;fl+=` Q${pts[i-1][0]} ${pts[i-1][1]} ${cx} ${cy}`;ln+=` Q${pts[i-1][0]} ${pts[i-1][1]} ${cx} ${cy}`;}
fl+=` L${pts[pts.length-1][0]} ${pts[pts.length-1][1]} L${pts[pts.length-1][0]} ${H} Z`;
ln+=` L${pts[pts.length-1][0]} ${pts[pts.length-1][1]}`;
paths+=`<path d="${fl}" fill="rgba(${rr},${gg},${bb},0.12)"/>`;
paths+=`<path d="${ln}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>`;
pts.forEach(pt=>{paths+=`<circle cx="${pt[0]}" cy="${pt[1]}" r="3.5" fill="${col}"/>`;});
}
legend+=`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:8px;"><span style="width:8px;height:8px;border-radius:50%;background:${col};display:inline-block;"></span><span style="font-size:11px;color:#78705a;">${n}</span></span>`;
});
return`<div class="wave-box"><div class="lbl">手ごたえの波</div><div class="wave-inner"><div class="wave-yax"><span>😊</span><span>🙂</span><span>😐</span></div><svg viewBox="0 0 ${W} ${H}" style="flex:1;height:${H}px;display:block;overflow:visible;">${paths}</svg></div><div style="display:flex;justify-content:space-between;padding-left:26px;margin-top:4px;"><span style="font-size:10px;color:#ccc;font-style:italic;">早い順</span><span style="font-size:10px;color:#ccc;font-style:italic;">最新 →</span></div><div style="margin-top:8px;padding-left:26px;">${legend}</div></div>`;
}

function makeCards(r){
if(!r.length)return`<div style="text-align:center;padding:16px;font-size:12px;color:#ccc;font-style:italic;">まだ誰も記録していません</div>`;
const sorted=[…r.filter(x=>x.name===name),…r.filter(x=>x.name!==name)];
return sorted.map(x=>{
const isMe=x.name===name;
const f=x.feel?FACE[x.feel]:”—”;
return`<div class="mcard${isMe?" me":""}"> <div class="mc-top"> <div class="mc-init" style="border-color:${gc(x.name)}">${x.name.charAt(0)}</div> <span class="mc-name">${x.name}</span> ${isMe?`<span style="font-size:10px;color:#7a9a6c;">あなた</span>`:""} <span class="mc-face">${f}</span> </div> ${x.ans?`<div class="mc-ans">${x.ans}</div>`:`<div class="mc-none">— 手ごたえのみ記録</div>`} </div>`;
}).join(””);
}

function setFeel(t){feels[day]=t;renderPage();}

async function doRecord(){
if(!ans[day]&&!feels[day]){alert(“一言か手ごたえを入力してください。”);return;}
sending=true;renderPage();
try{
await fetch(`${GAS}?action=save&day=${day}&name=${encodeURIComponent(name)}&feel=${feels[day]}&ans=${encodeURIComponent(ans[day])}`,{method:“GET”,mode:“no-cors”});
localStorage.setItem(“yt9_feel_”+day,feels[day]);
showToast(“仲間に届いた。”);
setTimeout(()=>doLoad(),1200);
}catch(e){alert(“送信できませんでした。”);}
sending=false;renderPage();
}

async function doLoad(){
loading=true;renderPage();
try{
const res=await fetch(`${GAS}?action=load&day=${day}`,{mode:“cors”});
const data=await res.json();
if(data.ok)rows[day]=data.rows;
}catch(e){alert(“取得できませんでした。もう一度「更新」を押してください。”);}
loading=false;renderPage();
}

function showToast(msg){
const t=document.createElement(“div”);
t.className=“toast”;
t.innerHTML=`<div class="toast-box"><div class="toast-ttl">Recorded</div><div class="toast-msg">${msg}</div></div>`;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2400);
}

// グローバルに公開
window.setName=setName;
window.goDay=goDay;
window.setFeel=setFeel;
window.doRecord=doRecord;
window.doLoad=doLoad;

// 起動
const sn=localStorage.getItem(“yt9_name”);
if(sn){name=sn;[1,2,3].forEach(d=>{const f=localStorage.getItem(“yt9_feel_”+d);if(f)feels[d]=f;});document.getElementById(“name-screen”).className=“hidden”;document.getElementById(“main-screen”).className=””;goDay(day);}
</script>

</body>
</html>
